# Applies Supabase migrations to the PROD project on merge to main.
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN      Personal access token (Supabase dashboard → Account → Access Tokens)
#   SUPABASE_PROD_PROJECT_REF  The prod project ref (NOT dev)
#   SUPABASE_PROD_DB_PASSWORD  The prod database password
#
# Connection (the deployed app's env vars on Vercel) is separate from schema
# (this workflow). This job only syncs schema; it never touches dev.
name: Migrate prod database

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch: {} # allow manual runs from the Actions tab

concurrency:
  group: db-migrate-prod
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROD_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to prod project
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Apply pending migrations
        run: supabase db push
