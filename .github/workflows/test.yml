# Gates PRs (and dev/main pushes) with the coach-web suite. No secrets needed.
name: Test (coach-web)

on:
  pull_request:
  push:
    branches: [dev, main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Unit tests mock all queries; the Supabase client only needs to construct
      # without throwing. Real connection comes from .env.local (dev) / Vercel (prod).
      VITE_SUPABASE_URL: http://localhost:54321
      VITE_SUPABASE_ANON_KEY: test-anon-key
    defaults:
      run:
        working-directory: apps/coach-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/coach-web/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
