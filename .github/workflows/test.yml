# Gates PRs (and dev/main pushes) with the coach-web suite. No secrets needed.
name: Test (coach-web)

on:
  pull_request:
  push:
    branches: [dev, main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/coach-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/coach-web/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      # Unit tests only. lib/queries/*.test.ts are integration tests that need a
      # live Supabase + service-role (run locally via `npm test`).
      - run: npm run test:unit
