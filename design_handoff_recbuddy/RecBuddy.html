<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RecBuddy — Client App</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:ital,wght@0,600;0,700;0,800;1,700;1,800&family=Space+Grotesk:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #0A0C08; }
  body { font-family: -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  #root { height: 100%; }
  /* dark stage for the focused Athletic phone */
  .rb-stage {
    height: 100%; width: 100%;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(1100px 700px at 50% -10%, rgba(173,255,47,0.10), transparent 60%),
      radial-gradient(900px 600px at 50% 120%, rgba(124,203,0,0.07), transparent 60%),
      #0A0C08;
    overflow: hidden;
  }
  .rb-phonewrap { transform-origin: center center; }
  /* hide inner scrollbars for a clean device look */
  div::-webkit-scrollbar { width: 0; height: 0; }
  div { scrollbar-width: none; }
  @keyframes rbdot {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }
  @keyframes rbSheetIn  { from { transform: translateY(28px); } to { transform: translateY(0); } }
  @keyframes rbSheetOut { from { transform: translateY(0); } to { transform: translateY(28px); } }
  @keyframes rbFadeIn   { from { opacity: 0.5; } to { opacity: 1; } }
  @keyframes rbFadeOut  { from { opacity: 1; } to { opacity: 0.5; } }
  button { font: inherit; }
  .rb-metal-lime {
    color: #C8FF5C;
    text-shadow: 0 -1px 0 rgba(255,255,255,0.45), 0 1px 0 #7DC421, 0 2px 2px rgba(0,0,0,0.45), 0 4px 7px rgba(0,0,0,0.4);
  }
  .rb-metal-silver {
    color: #FCFFF6;
    text-shadow: 0 -1px 0 rgba(255,255,255,0.55), 0 1px 0 #97A784, 0 2px 2px rgba(0,0,0,0.45), 0 4px 7px rgba(0,0,0,0.4);
  }
  .rb-metal-slogan {
    background-image: linear-gradient(180deg, #FFFFFF 0%, #E4EDD6 44%, #9FB089 76%, #F2F8E8 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    text-shadow: 0 1px 1px rgba(0,0,0,0.4);
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- scaffolding -->
<script type="text/babel" src="frames/ios-frame.jsx"></script>
<script type="text/babel" src="frames/design-canvas.jsx"></script>

<!-- app -->
<script type="text/babel" src="app/core.jsx"></script>
<script type="text/babel" src="app/ui.jsx"></script>
<script type="text/babel" src="app/login.jsx"></script>
<script type="text/babel" src="app/signup.jsx"></script>
<script type="text/babel" src="app/calendar.jsx"></script>
<script type="text/babel" src="app/chat.jsx"></script>
<script type="text/babel" src="app/metrics.jsx"></script>
<script type="text/babel" src="app/app.jsx"></script>

<script type="text/babel" data-presets="react">
  const RBApp = window.RecBuddyApp;
  const RBThemes = window.THEMES;

  function Stage() {
    const wrapRef = React.useRef(null);
    React.useEffect(() => {
      const fit = () => {
        const el = wrapRef.current; if (!el) return;
        const pad = 48;
        const sx = (window.innerWidth - pad) / el.offsetWidth;
        const sy = (window.innerHeight - pad) / el.offsetHeight;
        const s = Math.min(1, sx, sy);
        el.style.transform = `scale(${s})`;
      };
      fit();
      window.addEventListener('resize', fit);
      const t = setTimeout(fit, 300);
      return () => { window.removeEventListener('resize', fit); clearTimeout(t); };
    }, []);
    return (
      <div className="rb-stage">
        <div className="rb-phonewrap" ref={wrapRef}>
          <RBApp theme={RBThemes.athletic} />
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Stage />);
</script>
</body>
</html>
